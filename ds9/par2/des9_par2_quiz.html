<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Pasarelas de Pago & Criptomonedas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --surface: #0d1117;
    --surface2: #13192a;
    --border: #1e2d4a;
    --accent: #2d7aff;
    --accent2: #00e5c3;
    --accent3: #ff4d6a;
    --gold: #f0c040;
    --text: #e8edf7;
    --muted: #5a6a88;
    --correct: #00c97a;
    --wrong: #ff3f5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(45,122,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,122,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(45,122,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid rgba(0,229,195,0.3);
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }
  h1 .alt { color: var(--accent2); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
  }

  /* ── Progress ── */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .q-counter {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 500;
  }

  .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .score-display span {
    color: var(--accent2);
    font-weight: 500;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    margin-bottom: 20px;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 12px 12px 0 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .q-card.active::before { opacity: 1; }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .q-topic {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 14px;
  }

  .topic-blockchain { background: rgba(45,122,255,0.15); color: var(--accent); }
  .topic-cripto     { background: rgba(240,192,64,0.15); color: var(--gold); }
  .topic-pasarelas  { background: rgba(0,229,195,0.15); color: var(--accent2); }
  .topic-plataformas{ background: rgba(255,77,106,0.18); color: var(--accent3); }
  .topic-legal      { background: rgba(180,120,255,0.15); color: #c97dff; }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  /* ── Options ── */
  .options {
    display: grid;
    gap: 10px;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }

  .opt:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(45,122,255,0.08);
    transform: translateX(3px);
  }

  .opt-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.2s;
  }

  .opt-text {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.45;
    color: var(--text);
  }

  /* Answered states */
  .opt.correct {
    border-color: var(--correct);
    background: rgba(0,201,122,0.1);
  }
  .opt.correct .opt-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: #000;
  }
  .opt.wrong {
    border-color: var(--wrong);
    background: rgba(255,63,92,0.1);
  }
  .opt.wrong .opt-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  .opt.disabled { cursor: default; }
  .opt.show-correct {
    border-color: rgba(0,201,122,0.4);
    opacity: 0.6;
  }
  .opt.show-correct .opt-letter {
    border-color: var(--correct);
    color: var(--correct);
  }

  /* ── Feedback ── */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.55;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .feedback.correct-fb {
    background: rgba(0,201,122,0.08);
    border: 1px solid rgba(0,201,122,0.25);
    color: #7dffb8;
    display: block;
  }

  .feedback.wrong-fb {
    background: rgba(255,63,92,0.08);
    border: 1px solid rgba(255,63,92,0.25);
    color: #ff9aaa;
    display: block;
  }

  .feedback strong { display: block; margin-bottom: 4px; font-weight: 600; }

  /* ── Next button ── */
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .next-btn:hover {
    background: #4d90ff;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(45,122,255,0.3);
  }

  .next-btn.visible { display: block; animation: fadeUp 0.3s ease; }

  /* ── Results ── */
  #results {
    display: none;
    animation: fadeUp 0.5s ease;
  }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .results-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  }

  .results-icon {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .results-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .results-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .score-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 500;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .score-label {
    color: var(--muted);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .stat-val.green { color: var(--correct); }
  .stat-val.red   { color: var(--wrong); }
  .stat-val.blue  { color: var(--accent); }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'JetBrains Mono', monospace;
  }

  .grade-msg {
    padding: 16px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 28px;
  }

  .restart-btn {
    padding: 16px 40px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .restart-btn:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 24px rgba(45,122,255,0.3);
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── Confetti particles ── */
  .particle {
    position: fixed;
    pointer-events: none;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
    z-index: 999;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 520px) {
    .q-card { padding: 24px 18px; }
    .q-text { font-size: 15px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stats-row .stat-box:last-child { grid-column: 1/-1; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">Desarrollo de Software IX · UTP</div>
    <h1>Quiz de <span>Pasarelas</span> &amp; <br class="alt"><span class="alt">Criptomonedas</span></h1>
    <p class="subtitle">100 preguntas · Semanas 3 y 4 · E-Commerce</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="q-counter" id="q-counter">Pregunta 1 / 100</span>
      <span class="score-display">Puntaje: <span id="score-live">0</span></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:5%"></div>
    </div>
  </div>

  <div id="quiz-area">
    <div class="q-card active" id="q-card">
      <div class="q-num" id="q-num">// 01</div>
      <div class="q-topic" id="q-topic"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn">Siguiente pregunta →</button>
    </div>
  </div>

  <div id="results">
    <div class="results-card">
      <span class="results-icon" id="results-icon">🏆</span>
      <div class="results-title" id="results-title">¡Resultado final!</div>
      <p class="results-sub" id="results-sub"></p>
      <div class="score-big" id="score-big"></div>
      <div class="score-label">puntos obtenidos</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val green" id="stat-correct">0</div>
          <div class="stat-label">Correctas</div>
        </div>
        <div class="stat-box">
          <div class="stat-val red" id="stat-wrong">0</div>
          <div class="stat-label">Incorrectas</div>
        </div>
        <div class="stat-box">
          <div class="stat-val blue" id="stat-pct">0%</div>
          <div class="stat-label">Precisión</div>
        </div>
      </div>
      <div class="grade-msg" id="grade-msg"></div>
      <button class="restart-btn" onclick="restart()">↺ Reiniciar quiz</button>
    </div>
  </div>

</div>

<script>
const questions = [
  // ── BLOCKCHAIN (1–12) ──
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Cuál es la característica principal que diferencia a blockchain de una base de datos tradicional?",
    opts: [
      "Es más rápida y económica de operar",
      "Es un registro distribuido e inmutable sin necesidad de autoridad central",
      "Solo puede almacenar transacciones financieras",
      "Requiere un servidor centralizado para funcionar"
    ],
    correct: 1,
    exp: "Blockchain es un registro distribuido e inmutable donde los bloques están enlazados criptográficamente, operando de manera descentralizada sin intermediarios."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Qué mecanismos se utilizan para validar y acordar el estado en una red blockchain?",
    opts: [
      "Firewalls y antivirus distribuidos",
      "Autoridades certificadoras centrales",
      "Mecanismos de consenso como PoW y PoS",
      "Servidores DNS distribuidos"
    ],
    correct: 2,
    exp: "Los mecanismos de consenso (Proof of Work, Proof of Stake) permiten que los nodos de la red acuerden el estado válido de la cadena sin necesidad de una autoridad central."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "En el flujo de una transacción blockchain, ¿qué ocurre inmediatamente DESPUÉS de que el usuario inicia la transacción con su clave privada?",
    opts: [
      "El bloque se añade permanentemente a la cadena",
      "La transacción se transmite a la red P2P",
      "Los nodos verifican la firma y saldo",
      "El minero agrupa las transacciones en un bloque"
    ],
    correct: 1,
    exp: "El flujo es: (1) inicio con clave privada → (2) difusión a la red P2P → (3) validación de nodos → (4) agrupación en bloque → (5) consenso → (6) confirmación."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Qué componente de blockchain garantiza que los bloques no puedan ser alterados retroactivamente?",
    opts: [
      "Las tarjetas de crédito tokenizadas",
      "El hash criptográfico del bloque anterior incluido en cada bloque",
      "Los contratos de custodia institucional",
      "Los protocolos SSL/TLS de la red"
    ],
    correct: 1,
    exp: "Cada bloque contiene el hash del bloque anterior, formando una cadena. Alterar un bloque cambia su hash, invalidando todos los bloques posteriores, lo que hace la cadena inmutable."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Qué rol cumplen los nodos en una red blockchain P2P?",
    opts: [
      "Actúan como bancos centrales que aprueban transacciones",
      "Solo almacenan las transacciones más recientes",
      "Mantienen copias completas del ledger distribuido",
      "Emiten nuevas criptomonedas bajo demanda"
    ],
    correct: 2,
    exp: "Los nodos de la red P2P mantienen copias completas del ledger (libro contable), garantizando la descentralización y redundancia del sistema."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Cuál es la función de las firmas digitales en una transacción blockchain?",
    opts: [
      "Encriptar el contenido de los bloques para que nadie pueda leerlos",
      "Garantizar la autenticidad e integridad de la transacción",
      "Convertir automáticamente la criptomoneda a fiat",
      "Definir las comisiones de red aplicables"
    ],
    correct: 1,
    exp: "Las firmas digitales (basadas en criptografía de clave pública/privada) garantizan que la transacción fue iniciada por el propietario legítimo y no fue alterada en tránsito."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Cuánto tiempo promedio toma obtener una confirmación en la red Bitcoin?",
    opts: [
      "0.4 segundos",
      "15 segundos a 2 minutos",
      "10 a 60 minutos",
      "2.5 a 10 minutos"
    ],
    correct: 2,
    exp: "Bitcoin tiene un tiempo de bloque de ~10 minutos, por lo que obtener 1–6 confirmaciones puede tomar entre 10 y 60 minutos, siendo la red más lenta entre las principales."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Qué red blockchain tiene el tiempo de confirmación más rápido según la comparativa de velocidad?",
    opts: [
      "Bitcoin (BTC)",
      "Litecoin (LTC)",
      "Ethereum (ETH)",
      "Solana (SOL)"
    ],
    correct: 3,
    exp: "Solana confirma transacciones en 0.4 segundos, siendo la más rápida. Lightning Network es casi instantáneo (~3s) pero es una capa 2 sobre Bitcoin, no una blockchain independiente."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Qué confirma la etapa de 'validación' en el flujo de una transacción blockchain?",
    opts: [
      "Que el comercio tiene licencia para operar",
      "Que la firma digital es válida y el saldo es suficiente",
      "Que el banco adquirente ha recibido los fondos",
      "Que la pasarela de pago ha procesado el cobro"
    ],
    correct: 1,
    exp: "Durante la validación, los nodos verifican dos cosas: que la firma digital sea válida (autenticidad) y que el saldo disponible sea suficiente para la transacción."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Cuántas confirmaciones requiere típicamente Ethereum para considerar una transacción segura?",
    opts: [
      "1 confirmación instantánea",
      "1–6 bloques",
      "12–30 bloques",
      "100+ bloques"
    ],
    correct: 2,
    exp: "Ethereum requiere entre 12 y 30 confirmaciones de bloque, con un tiempo promedio de 15 segundos a 2 minutos por bloque, resultando en tiempos de finalidad de pocos minutos."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Por qué el blockchain se describe como un sistema de 'confianza distribuida'?",
    opts: [
      "Porque requiere la confianza de múltiples bancos centrales",
      "Porque la verificación la realiza la red de nodos sin necesidad de un intermediario central",
      "Porque todos los usuarios deben conocerse mutuamente",
      "Porque los gobiernos supervisan cada transacción"
    ],
    correct: 1,
    exp: "El blockchain crea confianza a través de la verificación distribuida por múltiples nodos independientes, usando criptografía y consenso en lugar de depender de una autoridad central confiable."
  },
  {
    topic: "blockchain", topicLabel: "Blockchain",
    text: "¿Qué significa que una transacción blockchain sea 'irreversible' una vez confirmada?",
    opts: [
      "Que se puede revertir solo con autorización bancaria",
      "Que el comercio puede emitir reembolsos en 24 horas",
      "Que no existe mecanismo técnico para deshacerla, eliminando chargebacks",
      "Que permanece pendiente por 30 días antes de liquidarse"
    ],
    correct: 2,
    exp: "La irreversibilidad es una característica clave del blockchain: una vez confirmada, la transacción no puede deshacerse, lo que elimina el riesgo de chargebacks para los comercios."
  },

  // ── CRIPTOMONEDAS (13–28) ──
  {
    topic: "cripto", topicLabel: "Criptomonedas",
    text: "¿Qué criptomoneda elimina completamente el riesgo de volatilidad para los comercios e-commerce?",
    opts: ["Bitcoin (BTC)", "Ethereum (ETH)", "Solana (SOL)", "Stablecoins (USDT/USDC)"],
    correct: 3,
    exp: "Las stablecoins tienen valor anclado 1:1 a monedas fiat, eliminando el riesgo de volatilidad. En 2024 ya representan el 38% de los pagos cripto en e-commerce."
  },
  {
    topic: "cripto", topicLabel: "Criptomonedas",
    text: "Lightning Network es una capa 2 sobre Bitcoin. ¿Cuál es su principal ventaja para el comercio diario?",
    opts: [
      "Soporta contratos inteligentes avanzados",
      "Confirmaciones casi instantáneas (<5s) con comisiones de $0.01 o menos",
      "Elimina la volatilidad de Bitcoin",
      "Tiene mayor capitalización que Ethereum"

let correct = 0;
let wrong = 0;
let answered = false;

const topicClasses = {
  blockchain:  "topic-blockchain",
  cripto:      "topic-cripto",
  pasarelas:   "topic-pasarelas",
  plataformas: "topic-plataformas",
  legal:       "topic-legal"
};

const LETTERS = ['A','B','C','D'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Shuffle questions on load
const shuffledQ = shuffle(questions);

function loadQuestion() {
  answered = false;
  const q = shuffledQ[current];

  document.getElementById('q-num').textContent = `// ${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-counter').textContent = `Pregunta ${current+1} / ${shuffledQ.length}`;
  document.getElementById('progress-fill').style.width = `${((current+1)/shuffledQ.length)*100}%`;

  const topicEl = document.getElementById('q-topic');
  topicEl.textContent = q.topicLabel;
  topicEl.className = `q-topic ${topicClasses[q.topic] || ''}`;

  document.getElementById('q-text').textContent = q.text;

  // Shuffle options but track correct answer
  const indices = shuffle([0,1,2,3]);
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  indices.forEach((origIdx, displayIdx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.dataset.orig = origIdx;
    btn.innerHTML = `
      <span class="opt-letter">${LETTERS[displayIdx]}</span>
      <span class="opt-text">${q.opts[origIdx]}</span>
    `;
    btn.addEventListener('click', () => selectAnswer(btn, origIdx, q.correct, q.exp));
    optContainer.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = current < shuffledQ.length - 1 ? 'Siguiente pregunta →' : 'Ver resultados →';

  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function selectAnswer(btn, selected, correct_idx, exp) {
  if (answered) return;
  answered = true;

  const allOpts = document.querySelectorAll('.opt');
  allOpts.forEach(o => o.classList.add('disabled'));

  const fb = document.getElementById('feedback');

  if (parseInt(selected) === correct_idx) {
    btn.classList.add('correct');
    score++;
    correct++;
    document.getElementById('score-live').textContent = score;
    fb.innerHTML = `<strong>✓ ¡Correcto!</strong>${exp}`;
    fb.className = 'feedback correct-fb';
  } else {
    btn.classList.add('wrong');
    wrong++;
    // Show correct answer
    allOpts.forEach(o => {
      if (parseInt(o.dataset.orig) === correct_idx) {
        o.classList.add('show-correct');
        o.querySelector('.opt-letter').style.color = 'var(--correct)';
        o.querySelector('.opt-letter').style.borderColor = 'var(--correct)';
      }
    });
    fb.innerHTML = `<strong>✗ Incorrecto.</strong>${exp}`;
    fb.className = 'feedback wrong-fb';
  }

  document.getElementById('next-btn').classList.add('visible');
}

document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  if (current < shuffledQ.length) {
    loadQuestion();
  } else {
    showResults();
  }
});

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';

  const pct = Math.round((correct / shuffledQ.length) * 100);

  document.getElementById('score-big').textContent = correct;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-pct').textContent = pct + '%';

  let icon, title, sub, gradeStyle, gradeText;

  if (pct >= 90) {
    icon = '🏆'; title = '¡Excelente dominio!';
    sub = 'Tienes un conocimiento sobresaliente del tema.';
    gradeStyle = 'background:rgba(0,201,122,0.1);border:1px solid rgba(0,201,122,0.3);color:#7dffb8;';
    gradeText = 'Nota: A — Sobresaliente';
    spawnConfetti();
  } else if (pct >= 75) {
    icon = '⭐'; title = '¡Muy buen resultado!';
    sub = 'Dominas la mayor parte del contenido.';
    gradeStyle = 'background:rgba(45,122,255,0.1);border:1px solid rgba(45,122,255,0.3);color:#8ab4ff;';
    gradeText = 'Nota: B — Bueno';
  } else if (pct >= 60) {
    icon = '📚'; title = 'Resultado aceptable';
    sub = 'Repasa los temas donde fallaste para reforzar.';
    gradeStyle = 'background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.3);color:#f0c040;';
    gradeText = 'Nota: C — Regular';
  } else {
    icon = '🔄'; title = 'Necesitas repasar';
    sub = 'Te recomendamos releer las diapositivas del curso.';
    gradeStyle = 'background:rgba(255,63,92,0.1);border:1px solid rgba(255,63,92,0.3);color:#ff9aaa;';
    gradeText = 'Nota: D — Insuficiente';
  }

  document.getElementById('results-icon').textContent = icon;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-sub').textContent = sub;
  const gm = document.getElementById('grade-msg');
  gm.style.cssText = gradeStyle;
  gm.textContent = gradeText;
}

function spawnConfetti() {
  const colors = ['#2d7aff','#00e5c3','#f0c040','#ff4d6a','#a78bfa'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = '-10px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.width = (6 + Math.random()*8) + 'px';
      p.style.height = (6 + Math.random()*8) + 'px';
      p.style.animationDuration = (1.5 + Math.random()*2) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 50);
  }
}

function restart() {
  current = 0; score = 0; correct = 0; wrong = 0; answered = false;
  document.getElementById('score-live').textContent = 0;
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.querySelector('.progress-wrap').style.display = 'block';
  // Reshuffle
  shuffledQ.length = 0;
  shuffledQ.push(...shuffle(questions));
  loadQuestion();
}

// Init
loadQuestion();
</script>
</body>
</html>
