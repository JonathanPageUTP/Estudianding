<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | Portafolio</title>
    <style>
        /* Estilos Globales */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* Contenedor de Botones */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilo de Botones Formales */
        .btn {
            text-decoration: none;
            color: #000000;
            border: 1px solid #000000;
            padding: 15px 30px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* Efecto Hover */
        .btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bienvenido</h1>
        
        <nav class="menu">
            <a href="detallado.html" class="btn">Detallado</a>
            <a href="cards.html" class="btn">Cards</a>
            <a href="allinone.html" class="btn">Todo en uno</a>
        </nav>
    </div>

</body>
</html>
